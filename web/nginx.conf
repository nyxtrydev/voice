# Frontend nginx: serves the SPA and reverse-proxies API traffic to the backend
# so the browser stays same-origin (no CORS). The backend host is injected via the
# BACKEND_URL env (defaulted in docker-compose); Twilio talks to the backend directly,
# not through here, so only /api needs proxying for the dashboard.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Static assets with long cache; index.html stays fresh for new deploys.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # REST + Server-Sent Events → backend
  location /api/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;   # long-lived SSE
    proxy_buffering off;       # stream SSE events immediately
  }

  # Optional: health passthrough
  location = /healthz {
    proxy_pass http://api:4000/healthz;
  }

  # SPA fallback — every other path serves index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
